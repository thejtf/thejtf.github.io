name: Daily WeRead Sync and Deploy

on:
  schedule:
    # 每天一次（UTC 00:10 = 北京时间 08:10）
    # 作为本地 cron 的备用保障
    - cron: '10 0 * * *'
  workflow_dispatch:  # 允许在 GitHub 上手动触发

permissions:
  contents: write  # 需要 write 权限才能 push 到仓库

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: source  # 从 source 分支拉取源代码
          token: ${{ secrets.GITHUB_TOKEN }}  # 需要 token 才能 push

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Sync WeRead notes
        env:
          WEREAD_API_KEY: ${{ secrets.WEREAD_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: npx hexo weread-sync || true

      - name: Commit synced notes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add source/_reads/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto sync WeRead notes - $(date +%Y-%m-%d)"
            git push origin source
          fi

      - name: Clean and generate
        run: |
          npx hexo clean
          npx hexo generate

      - name: Copy workflow file to public
        run: |
          mkdir -p public/.github/workflows
          cp .github/workflows/deploy.yml public/.github/workflows/deploy.yml

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: master
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Auto deploy'